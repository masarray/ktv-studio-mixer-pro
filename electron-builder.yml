appId: com.masari.sonkupik.karaoke
productName: SONKUPIK STUDIO
copyright: Copyright © 2026 Mas Ari
asar: true
# node-hid 3.x and serialport 12.x ship Windows N-API binaries. Rebuilding them
# with node-gyp is unnecessary and makes a normal end-user build require Python
# plus the full Visual C++ toolchain. The build script verifies that the
# packaged Windows N-API binaries exist without enumerating connected hardware.
npmRebuild: false
directories:
  output: release
  buildResources: build
files:
  - dist/**/*
  - electron/**/*
  - tools/k500-bridge.mjs
  - build/sonkupik-icon.png
  - package.json
  # Explicit runtime bridge dependencies. Keeping them here makes the desktop
  # hardware path auditable even if electron-builder dependency collection
  # behavior changes in a future release.
  - node_modules/ws/**/*
  - node_modules/node-hid/**/*
  - node_modules/pkg-prebuilds/**/*
  - node_modules/node-addon-api/**/*
  - node_modules/serialport/**/*
  - node_modules/@serialport/**/*
  - node_modules/node-gyp-build/**/*
  - node_modules/debug/**/*
  - node_modules/ms/**/*
extraResources:
  # Shipped outside ASAR so Electron can seed the user's editable PC Mode
  # library on first launch for both Portable and Setup builds.
  - from: resources/presets
    to: presets
    filter:
      - "**/*.k500"
asarUnpack:
  - "**/*.node"
  - "node_modules/node-hid/**/*"
  - "node_modules/hidraw/**/*"
  - "node_modules/serialport/**/*"
  - "node_modules/@serialport/**/*"
win:
  # Community builds are intentionally unsigned. Skip certificate discovery
  # and signtool retries, while leaving executable resource editing enabled so
  # the application icon, product name, and version remain embedded.
  signExecutable: false
  forceCodeSigning: false
  icon: build/sonkupik.ico
  executableName: sonkupik_karaoke
  target:
    - target: portable
      arch:
        - x64
    - target: nsis
      arch:
        - x64
portable:
  artifactName: SONKUPIK-STUDIO-${version}-Portable.exe
  requestExecutionLevel: user
nsis:
  artifactName: SONKUPIK-STUDIO-${version}-Setup.exe
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: always
  createStartMenuShortcut: true
  shortcutName: SONKUPIK STUDIO
  uninstallDisplayName: SONKUPIK STUDIO
