appId: com.masari.sonkupik.karaoke
productName: SONKUPIK STUDIO
copyright: Copyright © 2026 Mas Ari
asar: true
# node-hid 3.x and serialport 12.x ship Windows N-API binaries. Rebuilding them
# with node-gyp is unnecessary and makes a normal end-user build require Python
# plus the full Visual C++ toolchain. Native compatibility is verified by the
# build script under the actual Electron runtime before packaging.
npmRebuild: false
directories:
  output: release
  buildResources: build
files:
  - dist/**/*
  - electron/**/*
  - tools/k500-bridge.mjs
  - build/sonkupik-icon.png
  - package.json
asarUnpack:
  - "**/*.node"
  - "node_modules/node-hid/**/*"
  - "node_modules/hidraw/**/*"
  - "node_modules/serialport/**/*"
  - "node_modules/@serialport/**/*"
win:
  icon: build/sonkupik.ico
  executableName: sonkupik_karaoke
  target:
    - target: portable
      arch:
        - x64
    - target: nsis
      arch:
        - x64
portable:
  artifactName: sonkupik_karaoke.exe
  requestExecutionLevel: user
nsis:
  artifactName: sonkupik_karaoke_setup_${version}.exe
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: always
  createStartMenuShortcut: true
  shortcutName: SONKUPIK STUDIO
  uninstallDisplayName: SONKUPIK STUDIO
